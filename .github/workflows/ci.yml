name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: |
          py_files=$(git ls-files --cached --others --exclude-standard -- '*.py' ':(exclude)_bmad/**' ':(exclude).agents/**' ':(exclude).claude/**' ':(exclude).cursor/**')
          if [ -z "$py_files" ]; then
            echo "No Python source files found — skipping"
          else
            printf '%s\n' "$py_files" | xargs ruff check
          fi

      - name: Check formatting with ruff
        run: |
          py_files=$(git ls-files --cached --others --exclude-standard -- '*.py' ':(exclude)_bmad/**' ':(exclude).agents/**' ':(exclude).claude/**' ':(exclude).cursor/**')
          if [ -z "$py_files" ]; then
            echo "No Python source files found — skipping"
          else
            printf '%s\n' "$py_files" | xargs ruff format --check
          fi

      - name: Enforce single commit on PR branch
        if: github.event_name == 'pull_request'
        run: |
          commit_count=$(git rev-list --count ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          echo "Commits on this branch: $commit_count"
          if [ "$commit_count" -gt 1 ]; then
            echo ""
            echo "This PR has $commit_count commits. Squash them into 1 before pushing."
            echo ""
            echo "  git rebase -i ${{ github.event.pull_request.base.ref }}"
            echo "  # mark all commits except the first as 'squash'"
            echo "  git push --force-with-lease"
            echo ""
            exit 1
          fi
          echo "Single commit check passed"

      - name: Validate PR commit messages
        if: github.event_name == 'pull_request'
        run: |
          git log --format='%s' ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | while read -r msg; do
            echo "$msg" | grep -qE "^Merge " && continue
            echo "$msg" | grep -qE "^Revert " && continue
            if ! echo "$msg" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|revert)(\(.+\))?!?: .{1,72}$"; then
              echo "Invalid commit message: $msg"
              exit 1
            fi
          done
          echo "All commit messages valid"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "setup.cfg" ]; then
            pip install -e ".[dev]"
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies file found — skipping"
          fi

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pip install pytest pytest-cov
            pytest tests/ --tb=short -q
          else
            echo "No tests directory found — skipping"
          fi

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "setup.cfg" ]; then
            pip install -e ".[dev]"
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies file found — skipping"
          fi

      - name: Syntax check
        run: |
          py_files=$(git ls-files --cached --others --exclude-standard -- '*.py')
          if [ -z "$py_files" ]; then
            echo "No Python source files found — skipping"
          else
            printf '%s\n' "$py_files" | xargs python -m py_compile
          fi
